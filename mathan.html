<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Матан Тренажер</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg: #1e1e2e; --card: #313244; --text: #cdd6f4;
            --accent: #89b4fa; --green: #a6e3a1; --red: #f38ba8;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px;
        }
        h1 { color: var(--accent); margin-bottom: 5px; font-size: 1.5rem; }
        .subtitle { color: #a6adc8; margin-bottom: 20px; text-align: center; }
        .screen { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 15px; }
        .screen.active { display: flex; }
        
        .menu-btn {
            background: var(--card); border: 2px solid var(--accent); color: var(--text);
            padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: bold;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .menu-btn:hover { background: #45475a; }
        
        .quiz-header { display: flex; justify-content: space-between; background: #11111b; padding: 10px; border-radius: 8px; font-weight: bold;}
        .question-box { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; font-size: 1.4rem; min-height: 100px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 500px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        
        .option-btn { 
            background: #45475a; border: none; padding: 15px; border-radius: 8px; 
            color: #fff; cursor: pointer; transition: 0.2s; font-size: 1rem;
            min-height: 60px; display: flex; align-items: center; justify-content: center;
        }
        .option-btn.correct { background: var(--green) !important; color: #1e1e2e; font-weight: bold; }
        .option-btn.wrong { background: var(--red) !important; color: #1e1e2e; opacity: 0.7; }
        .option-btn:disabled { cursor: default; }

        .result-card { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; }
        .btn-main { background: var(--accent); border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; color: #1e1e2e; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="menuScreen" class="screen active">
        <h1>🧠 Матан Тренажер</h1>
        <div class="subtitle">Загрузка данных...</div>
        <div id="menuButtons" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="quizScreen" class="screen">
        <div class="quiz-header">
            <span id="progressText">0 / 0</span>
            <span style="color:var(--green)">Верно: <span id="scoreText">0</span></span>
        </div>
        <div class="question-box" id="questionDisplay"></div>
        <div class="options-grid" id="optionsContainer"></div>
        <button onclick="toMenu()" style="background:none; border:1px solid #444; color:#777; padding:8px; border-radius:5px; cursor:pointer; margin-top: 10px;">Выйти в меню</button>
    </div>

    <div id="resultScreen" class="screen">
        <div class="result-card">
            <h2 id="resTitle">Тренировка завершена!</h2>
            <div id="finalScore" style="font-size: 3.5rem; color: var(--accent); margin: 15px 0;"></div>
            <p id="feedbackMsg" style="margin-bottom: 25px;"></p>
            <button class="btn-main" onclick="toMenu()">К списку тем</button>
        </div>
    </div>

    <script>
        let fullData = null;
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let currentCategoryPool = []; // Здесь будем хранить вопросы только текущей темы

        // Загрузка JSON
        async function loadData() {
            try {
                const response = await fetch('data.json');
                fullData = await response.json();
                buildMenu();
            } catch (e) {
                document.querySelector('.subtitle').innerText = "Ошибка: не удалось загрузить data.json";
                console.error(e);
            }
        }

        // Построение меню
        function buildMenu() {
            const container = document.getElementById('menuButtons');
            document.querySelector('.subtitle').innerText = "Выбери раздел для практики";
            container.innerHTML = '';

            fullData.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.onclick = () => startQuiz(cat.id);
                btn.innerHTML = `<span>${cat.icon} ${cat.title}</span> <span>➜</span>`;
                container.appendChild(btn);
            });
        }

        // Начало квиза
        function startQuiz(categoryId) {
            const category = fullData.categories.find(c => c.id === categoryId);
            currentCategoryPool = category.questions; // Сохраняем всю тему для генерации ложных ответов
            
            // Перемешиваем и берем 10 штук
            currentQuestions = shuffleArray([...currentCategoryPool]).slice(0, 10);
            currentQuestionIndex = 0;
            score = 0;

            showScreen('quizScreen');
            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showResult();
                return;
            }

            const qData = currentQuestions[currentQuestionIndex];
            document.getElementById('progressText').innerText = `${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('scoreText').innerText = score;
            
            const qBox = document.getElementById('questionDisplay');
            qBox.innerHTML = `\\[ ${qData.q} = ? \\]`;

            // ГЕНЕРАЦИЯ ВАРИАНТОВ ОТВЕТА (ТОЛЬКО ИЗ ЭТОЙ ТЕМЫ)
            let correctAns = qData.a;
            
            // 1. Берем все уникальные ответы из этой категории
            let allAnswersInCat = [...new Set(currentCategoryPool.map(item => item.a))];
            
            // 2. Убираем правильный из списка потенциальных "лже-ответов"
            let wrongOptionsPool = allAnswersInCat.filter(a => a !== correctAns);
            
            // 3. Перемешиваем неправильные и берем 3 штуки
            let selectedWrongs = shuffleArray(wrongOptionsPool).slice(0, 3);
            
            // 4. Склеиваем и снова перемешиваем
            let finalOptions = shuffleArray([correctAns, ...selectedWrongs]);

            const optContainer = document.getElementById('optionsContainer');
            optContainer.innerHTML = '';

            finalOptions.forEach(optText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `\\( ${optText} \\)`;
                btn.onclick = () => {
                    if (btn.disabled) return;
                    checkAnswer(btn, optText === correctAns);
                };
                optContainer.appendChild(btn);
            });

            // Обновляем формулы MathJax
            MathJax.typesetPromise();
        }

        function checkAnswer(btn, isCorrect) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                // Подсветим правильный для обучения
                buttons.forEach(b => {
                    // Это небольшая хитрость, чтобы найти кнопку с правильным текстом
                    // Мы не можем просто сравнить innerHTML из-за MathJax, 
                    // поэтому логика проверки была выше
                });
            }

            setTimeout(() => {
                currentQuestionIndex++;
                renderQuestion();
            }, 1000);
        }

        function showResult() {
            showScreen('resultScreen');
            document.getElementById('finalScore').innerText = `${score} / ${currentQuestions.length}`;
            const msg = document.getElementById('feedbackMsg');
            const p = score / currentQuestions.length;
            
            if(p === 1) msg.innerText = "Абсолютное знание! Вы готовы к экзамену. 🏆";
            else if(p >= 0.8) msg.innerText = "Отличный результат! Мелкие ошибки не в счет. 🔥";
            else if(p >= 0.5) msg.innerText = "Хорошо, но стоит закрепить материал. 📖";
            else msg.innerText = "Нужно еще потренироваться. Попробуйте пройти тему еще раз. 🛠️";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toMenu() { showScreen('menuScreen'); }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        window.onload = loadData;
    </script>
</body>
</html>
